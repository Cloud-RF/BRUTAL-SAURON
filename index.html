<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BRUTAL SAURON</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: #0a0a0a;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        background: #111;
        color: #e0e0e0;
        padding: 10px 20px;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        border-bottom: 1px solid #333;
        flex-shrink: 0;
      }

      /* Burning-eye CloudRF trigger — fixed at bottom-centre over the map */
      #cloudrf-run {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        background: none;
        border: none;
        padding: 2px 4px;
        cursor: not-allowed;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 4px;
      }
      #cloudrf-run:not([disabled]) { cursor: pointer; }

      .eye-icon {
        display: block;
        transform-origin: 50% 68%;
      }
      #cloudrf-run[disabled] .eye-icon {
        opacity: 0.15;
        filter: grayscale(1);
      }
      #cloudrf-run:not([disabled]) .eye-icon {
        filter: drop-shadow(0 0 3px #ff2200) drop-shadow(0 0 8px rgba(200,0,0,0.35));
      }
      #cloudrf-run:not([disabled]):hover .eye-icon {
        filter:
          drop-shadow(0 0 6px #ff4400)
          drop-shadow(0 0 14px rgba(255,34,0,0.7))
          drop-shadow(0 0 28px rgba(180,0,0,0.5));
        animation: eye-blink 1.2s ease-in-out infinite;
      }
      @keyframes eye-blink {
        0%, 100% { transform: scaleY(1); }
        6%        { transform: scaleY(0.04); }
        16%       { transform: scaleY(1); }
      }

      #map {
        flex: 1;
      }

      /* Coord label below the marker */
      .coord-label {
        background: rgba(10, 10, 10, 0.85);
        color: #00e5ff;
        border: 1px solid #00e5ff44;
        border-radius: 4px;
        padding: 3px 8px;
        font-size: 12px;
        font-family: 'Courier New', monospace;
        font-weight: 600;
        white-space: nowrap;
        pointer-events: none;
      }

      .coord-label::before {
        content: '';
        position: absolute;
        top: -6px;
        left: 50%;
        transform: translateX(-50%);
        border-left: 6px solid transparent;
        border-right: 6px solid transparent;
        border-bottom: 6px solid #00e5ff44;
      }

      /* Override Leaflet layer control styling */
      .leaflet-control-layers {
        border: 1px solid #333 !important;
        background: rgba(17, 17, 17, 0.95) !important;
        border-radius: 6px !important;
        color: #e0e0e0 !important;
        box-shadow: 0 2px 12px rgba(0,0,0,0.5) !important;
      }

      .leaflet-control-layers-toggle {
        background-color: #1a1a1a !important;
        border: 1px solid #333 !important;
      }

      .leaflet-control-layers label {
        color: #ccc !important;
        font-size: 13px !important;
      }

      .leaflet-control-layers-separator {
        border-top-color: #333 !important;
      }

      .leaflet-control-zoom a {
        background: rgba(17, 17, 17, 0.95) !important;
        color: #e0e0e0 !important;
        border-color: #333 !important;
      }

      .leaflet-control-zoom a:hover {
        background: #222 !important;
        color: #00e5ff !important;
      }

      .leaflet-control-scale-line {
        background: rgba(17, 17, 17, 0.8) !important;
        border-color: #555 !important;
        color: #ccc !important;
        font-size: 11px !important;
      }

      .leaflet-control-attribution {
        background: rgba(10, 10, 10, 0.7) !important;
        color: #666 !important;
        font-size: 10px !important;
      }

      .leaflet-control-attribution a {
        color: #888 !important;
      }

      /* Grid polygon drag cursor */
      .grid-draggable {
        cursor: grab;
      }

      /* Corner resize handle circles */
      .corner-handle {
        cursor: nwse-resize;
      }
      .corner-ne,
      .corner-sw {
        cursor: nesw-resize;
      }

      /* ---- CSV import control ---- */
      .csv-control {
        background: rgba(17, 17, 17, 0.95);
        border: 1px solid #333;
        border-radius: 6px;
        padding: 10px 12px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
        min-width: 190px;
      }

      .csv-buttons {
        display: flex;
        gap: 6px;
        margin-bottom: 8px;
      }

      .csv-btn {
        flex: 1;
        display: block;
        background: #1a1a1a;
        color: #e0e0e0;
        border: 1px solid #444;
        border-radius: 4px;
        padding: 5px 10px;
        font-size: 11px;
        font-family: 'Segoe UI', system-ui, sans-serif;
        font-weight: 600;
        text-align: center;
        cursor: pointer;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        white-space: nowrap;
        transition: border-color 0.15s, color 0.15s;
      }
      .csv-btn:hover {
        border-color: #00ff00;
        color: #00ff00;
      }
      .csv-btn input[type="file"] {
        display: none;
      }

      .csv-clear-btn {
        background: #1a1a1a;
        color: #666;
        border: 1px solid #444;
        border-radius: 4px;
        padding: 5px 9px;
        font-size: 13px;
        cursor: pointer;
        transition: border-color 0.15s, color 0.15s;
      }
      .csv-clear-btn:hover {
        color: #ff4444;
        border-color: #ff4444;
      }

      /* ---- Settings modal ---- */
      .settings-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.72);
        z-index: 10000;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .settings-overlay.hidden { display: none; }

      .settings-dialog {
        background: #111;
        border: 1px solid #333;
        border-radius: 8px;
        padding: 24px;
        width: 360px;
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.85);
      }

      .settings-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }
      .settings-header h3 {
        color: #e0e0e0;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin: 0;
      }
      .settings-close-btn {
        background: none;
        border: none;
        color: #555;
        font-size: 18px;
        cursor: pointer;
        padding: 0;
        line-height: 1;
      }
      .settings-close-btn:hover { color: #ff4444; }

      .settings-field { margin-bottom: 16px; }
      .settings-field label {
        display: block;
        color: #666;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 6px;
        font-family: 'Segoe UI', system-ui, sans-serif;
      }
      .settings-field input {
        width: 100%;
        background: #0d0d0d;
        border: 1px solid #333;
        border-radius: 4px;
        color: #e0e0e0;
        font-size: 12px;
        font-family: 'Courier New', monospace;
        padding: 8px 10px;
        outline: none;
      }
      .settings-field input:focus { border-color: #00ff00; }

      .settings-footer {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 22px;
      }
      .settings-cancel-btn {
        background: #1a1a1a;
        color: #777;
        border: 1px solid #333;
        border-radius: 4px;
        padding: 7px 16px;
        font-size: 11px;
        cursor: pointer;
      }
      .settings-cancel-btn:hover { color: #ccc; border-color: #555; }
      .settings-save-btn {
        background: #1a1a1a;
        color: #00ff00;
        border: 1px solid #00ff00;
        border-radius: 4px;
        padding: 7px 16px;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        letter-spacing: 0.05em;
      }
      .settings-save-btn:hover { background: rgba(0,255,0,0.08); }

      /* CloudRF cell analysis spinner */
      @keyframes cell-spin {
        to { transform: translate(-50%, -50%) rotate(360deg); }
      }
      .cell-spinner {
        width: 26px;
        height: 26px;
        border: 3px solid rgba(0, 255, 0, 0.15);
        border-top-color: #00ff00;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        animation: cell-spin 0.7s linear infinite;
      }

      /* Legend section titles */
      .legend-title {
        font-family: 'Courier New', monospace;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.08em;
        color: #555;
        text-transform: uppercase;
        margin-bottom: 3px;
      }

      /* Fire palette — cell stddev legend (white → amber → red → black) */
      .cell-legend-bar {
        height: 7px;
        border-radius: 4px;
        background: linear-gradient(to right,
          rgb(255,255,255),
          rgb(255,210,0),
          rgb(255,90,0),
          rgb(160,0,0),
          rgb(0,0,0)
        );
        margin-bottom: 4px;
      }

      /* RSSI rainbow legend */
      .rssi-legend-bar {
        height: 7px;
        border-radius: 4px;
        background: linear-gradient(to right,
          hsl(0,100%,50%), hsl(60,100%,50%), hsl(120,100%,50%),
          hsl(180,100%,50%), hsl(240,100%,50%)
        );
        margin-bottom: 4px;
      }
      .rssi-legend-labels {
        display: flex;
        justify-content: space-between;
        font-family: 'Courier New', monospace;
        font-size: 10px;
        color: #666;
      }

      /* RSSI per-marker tooltip */
      .leaflet-tooltip.rssi-label {
        background: rgba(8, 8, 8, 0.5);
        border: none;
        box-shadow: none;
        padding: 2px 5px;
        border-radius: 3px;
        font-family: 'Courier New', monospace;
        font-size: 10px;
        font-weight: 700;
        white-space: nowrap;
      }
      .leaflet-tooltip.rssi-label::before {
        display: none;
      }

      /* Area label — centered on the polygon via CSS transform */
      .grid-label {
        display: inline-block;
        background: rgba(10, 10, 10, 0.88);
        color: #909090;
        border: 1px solid rgba(112, 112, 112, 0.45);
        border-radius: 4px;
        padding: 4px 10px;
        font-size: 12px;
        font-family: 'Courier New', monospace;
        font-weight: 700;
        white-space: nowrap;
        pointer-events: none;
        transform: translate(-50%, -50%);
        letter-spacing: 0.03em;
      }
    </style>
  </head>
  <body>
    <header>
      BRUTAL SAURON
    </header>
    <div id="map"></div>
    <button id="cloudrf-run" type="button" disabled title="Run CloudRF POINTS analysis">
      <div class="eye-icon">
        <svg viewBox="0 0 64 54" width="84" height="68" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- outer flanking flames -->
          <path d="M16 26Q14 13 18 5Q17 17 21 13" stroke="#cc2200" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
          <path d="M48 26Q50 13 46 5Q47 17 43 13" stroke="#cc2200" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
          <!-- main crown flames -->
          <path d="M22 23Q20 11 24 3Q23 15 27 10Q25 18 29 12Q28 19 32 14Q36 19 35 12Q39 18 37 10Q41 15 40 3Q44 11 42 23" stroke="#ff5500" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          <!-- eye white/sclera -->
          <path d="M2 36Q32 16 62 36Q32 56 2 36Z" fill="#1a0200" stroke="#e63800" stroke-width="2.8"/>
          <!-- iris layers -->
          <circle cx="32" cy="36" r="12" fill="#5a0800"/>
          <circle cx="32" cy="36" r="10.5" fill="none" stroke="#ff1100" stroke-width="0.6" opacity="0.5"/>
          <circle cx="32" cy="36" r="9" fill="#8c1200"/>
          <circle cx="32" cy="36" r="7.5" fill="#c01800"/>
          <!-- slit pupil — vertical ellipse, truly evil -->
          <ellipse cx="32" cy="36" rx="2.8" ry="7" fill="#050000"/>
          <!-- hellfire glow inside pupil -->
          <ellipse cx="32" cy="36" rx="1.2" ry="3.5" fill="#ff1100" opacity="0.45"/>
          <!-- specular gleam -->
          <ellipse cx="36.8" cy="30.5" rx="2.4" ry="1.6" fill="rgba(255,200,60,0.9)" transform="rotate(-20 36.8 30.5)"/>
          <!-- radial veins in iris -->
          <line x1="32" y1="24" x2="32" y2="29" stroke="#ff2200" stroke-width="0.6" opacity="0.4"/>
          <line x1="32" y1="43" x2="32" y2="48" stroke="#ff2200" stroke-width="0.6" opacity="0.4"/>
          <line x1="20" y1="36" x2="25" y2="36" stroke="#ff2200" stroke-width="0.6" opacity="0.4"/>
          <line x1="39" y1="36" x2="44" y2="36" stroke="#ff2200" stroke-width="0.6" opacity="0.4"/>
        </svg>
      </div>
    </button>

    <!-- CloudRF Settings Modal -->
    <div id="settings-modal" class="settings-overlay hidden">
      <div class="settings-dialog">
        <div class="settings-header">
          <h3>SOOTHSAYER Server</h3>
          <button id="settings-close" class="settings-close-btn" title="Close">✕</button>
        </div>
        <p style="font-size:11px;color:#888;margin-bottom:16px;line-height:1.5;">
          ⚠ The public CloudRF API enforces rate limits that will throttle this capability. A self-hosted server is recommended for performance.
        </p>
        <div class="settings-field">
          <label for="settings-server">Server URL</label>
          <input id="settings-server" type="text" placeholder="https://api.cloudrf.com">
        </div>
        <div class="settings-field">
          <label for="settings-key">API Key</label>
          <input id="settings-key" type="password" placeholder="Your CloudRF API key">
        </div>
        <div class="settings-footer">
          <button id="settings-cancel" class="settings-cancel-btn">Cancel</button>
          <button id="settings-save" class="settings-save-btn">Save</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
